name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Conventional commit title
    runs-on: ubuntu-latest
    steps:
      # Validates the PR title against the conventional-commits spec.
      # Defaults match the spec, including `feat!:` / `fix!:` for breaking changes.
      # subjectPattern additionally requires the subject to start lowercase.
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            should start with a lowercase character.
