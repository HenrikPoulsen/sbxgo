# .sbxgo/config.toml - sandbox configuration for this project
# Commit this file so everyone on the team uses the same settings.

[sandbox]

# agent: the AI agent to run inside the sandbox.
agent = "claude"

# docker: source of the sandbox template image.
# Optional. If omitted, sbx uses its default base image. When set, run
# `sbxgo setup` to build or pull and load the template before running
# `sbxgo run`.
#
# Set exactly one of:
#
#   [sandbox.docker]
#   image = "ghcr.io/acme/dev:1.4.0"   # pull a published image
#
# OR
#
#   [sandbox.docker.build]
#   context    = "."                     # build context (default ".")
#   dockerfile = ".sbxgo/Dockerfile"     # default ".sbxgo/Dockerfile"

# network_policy: declares the baseline you expect this sandbox to run under.
# One of:
#   allow-all   allow all outbound traffic
#   balanced    default sbx policy
#   deny-all    deny all by default; use allowed_domains to whitelist
# sbxgo does NOT change the host-wide default. Set it once on the host with
# `sbx policy init <value>`; this field is documentation + a hint for
# what allowed_domains/denied_domains layer on top of.
network_policy = "deny-all"

# clone: when true, sbx runs in clone mode (`--clone`): the host repo is
# mounted read-only and the agent works in an in-container clone exposed
# back to the host as the `sandbox-<name>` git remote. Omit or set false
# for direct mode (the sandbox writes directly to the mounted workspace).
# clone = true

# allowed_domains: domains to explicitly allow on top of network_policy.
# Scoped to this sandbox only (sbx 0.29.0+). sbxgo re-applies on every run;
# adding the same rule again is a no-op (sbx reports "Already covered").
allowed_domains = [
  # "api.example.com",
]

# denied_domains: domains to explicitly deny for this sandbox. Always wins
# over allow.
denied_domains = [
  # "example.com",
]

# kits: kit references applied at sandbox creation. Local directory paths
# are relative to the project root. Editing a kit's spec.yaml or files/
# (or adding, removing, or reordering kits here) is treated as create-time
# drift and `sbxgo run` will prompt to recreate the sandbox.
kits = [
  ".sbxgo/kits/go-tools",
]

# required_secrets: secret names that must be set on the host via `sbx secret set`.
# sbxgo run and sbxgo setup will warn (but not fail) if any are missing.
required_secrets = [
  # "MY_SECRET_TOKEN",
]

# extra_workspaces: additional host directories to mount into the sandbox.
extra_workspaces = [
  # "/home/user/shared-libs",
]
